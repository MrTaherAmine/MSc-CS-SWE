<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OOP Shopping Cart</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
      background: #f4f4f4;
    }

    h1 {
      color: #333;
    }

    .cart-box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      max-width: 700px;
    }

    button {
      margin: 5px;
      padding: 10px 15px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    .remove-btn {
      background: crimson;
    }

    .remove-btn:hover {
      background: darkred;
    }

    ul {
      padding-left: 20px;
    }

    li {
      margin-bottom: 10px;
    }

    .total {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="cart-box">
    <h1>Shopping Cart - OOP JavaScript</h1>

    <button onclick="addLaptop()">Add Laptop</button>
    <button onclick="addMouse()">Add Mouse</button>
    <button onclick="addKeyboard()">Add Keyboard</button>

    <h2>Cart Items</h2>
    <ul id="cart-items"></ul>

    <p class="total" id="total-items">Total Items: 0</p>
    <p class="total" id="cart-total">Cart Total: $0</p>
  </div>

  <script>
    class Product {
      constructor(id, name, price) {
        this.id = id;
        this.name = name;
        this.price = price;
      }
    }

    class ShoppingCartItem {
      constructor(product, quantity) {
        this.product = product;
        this.quantity = quantity;
      }

      getTotalPrice() {
        return this.product.price * this.quantity;
      }
    }

    class ShoppingCart {
      constructor() {
        this.items = [];
      }

      getTotalItems() {
        return this.items.reduce((total, item) => total + item.quantity, 0);
      }

      getCartTotal() {
        return this.items.reduce((total, item) => total + item.getTotalPrice(), 0);
      }

      addItem(product, quantity = 1) {
        const existingItem = this.items.find(item => item.product.id === product.id);

        if (existingItem) {
          existingItem.quantity += quantity;
        } else {
          this.items.push(new ShoppingCartItem(product, quantity));
        }

        this.displayCartItems();
      }

      removeItem(productId) {
        this.items = this.items.filter(item => item.product.id !== productId);
        this.displayCartItems();
      }

      displayCartItems() {
        const cartItemsList = document.getElementById("cart-items");
        const totalItemsText = document.getElementById("total-items");
        const cartTotalText = document.getElementById("cart-total");

        cartItemsList.innerHTML = "";

        if (this.items.length === 0) {
          cartItemsList.innerHTML = "<li>The cart is empty.</li>";
        } else {
          this.items.forEach(item => {
            const li = document.createElement("li");
            li.innerHTML = `
              ${item.product.name} - $${item.product.price} × ${item.quantity} = $${item.getTotalPrice()}
              <button class="remove-btn" onclick="cart.removeItem(${item.product.id})">Remove</button>
            `;
            cartItemsList.appendChild(li);
          });
        }

        totalItemsText.textContent = "Total Items: " + this.getTotalItems();
        cartTotalText.textContent = "Cart Total: $" + this.getCartTotal();
      }
    }

    const product1 = new Product(1, "Laptop", 1200);
    const product2 = new Product(2, "Mouse", 25);
    const product3 = new Product(3, "Keyboard", 75);

    const cart = new ShoppingCart();

    function addLaptop() {
      cart.addItem(product1, 1);
    }

    function addMouse() {
      cart.addItem(product2, 1);
    }

    function addKeyboard() {
      cart.addItem(product3, 1);
    }

    cart.displayCartItems();
  </script>
</body>
</html>
